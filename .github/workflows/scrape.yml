name: Weekly SAP SF Release Scrape

on:
  schedule:
    # Every Monday at 06:00 UTC (SAP releases typically publish midweek)
    - cron: "0 6 * * 1"
  workflow_dispatch:
    # Manual trigger from GitHub Actions UI

permissions:
  contents: write  # Needed to push commits back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python3 -m playwright install chromium --with-deps

      - name: Run scraper and commit changes
        env:
          GIT_USER_NAME: "SAP Release Bot"
          GIT_USER_EMAIL: "release-bot@sf-release-update.github"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: bash run_scraper.sh

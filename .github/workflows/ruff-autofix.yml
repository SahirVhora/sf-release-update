name: Ruff autofix

on:
  push:
    branches: [agent/fix-ci-production-branch]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/fix-ci-production-branch
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install ruff
      - name: Apply safe Ruff fixes
        run: ruff check . --fix
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Apply Ruff autofixes"
          git push

name: Dependabot auto-merge

# Security model: this workflow triggers on `pull_request_target` which
# runs in the base repo context with elevated permissions. The risk is
# bounded by two gates:
#   1. `if: github.actor == 'dependabot[bot]'` ensures only Dependabot
#      PRs run this workflow.
#   2. The job body only asks GitHub to enable auto-merge for the PR URL.
#      It does NOT execute code from the PR, install dependencies from the
#      PR branch, or check out the PR's commit.
#
# GitHub Actions' GITHUB_TOKEN is not allowed to approve pull requests, so
# this workflow intentionally does not call `gh pr review --approve`. If
# branch protection requires approval, Dependabot PRs will wait for a human
# review instead of turning this workflow red.
on: pull_request_target

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge (squash)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

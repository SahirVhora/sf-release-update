name: Scraper unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays at 07:00 UTC - one hour after the live scrape at 06:00.
    # Catches scraper regressions even when the data is unchanged.
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Run scraper unit tests
        working-directory: ${{ github.workspace }}
        run: |
          PYTHONPATH=. python3 tests/test_scraper.py

      - name: Collect ruff diagnostics
        run: ruff check . --output-format json > ruff-report.json || true

      - name: Upload ruff diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: ruff-report.json
          if-no-files-found: error

      - name: Run ruff lint
        run: ruff check .

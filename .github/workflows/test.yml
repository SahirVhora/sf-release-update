name: Scraper unit tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Mondays at 07:00 UTC - one hour after the live scrape at 06:00.
    # Catches scraper regressions even when the data is unchanged.
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper unit tests
        working-directory: ${{ github.workspace }}
        run: |
          PYTHONPATH=. python3 tests/test_scraper.py

      - name: Run ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          args: "check ."

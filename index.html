<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Update Pulse - SAP SuccessFactors Release Tracker</title>
<style>
/* =========== RESET & BASE =========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="dark"]{
  --bg:#0a0a0f; --bg2:#12121a; --bg3:#1a1a26; --bg4:#22223a;
  --text:#e2e2ea; --text2:#9898b0; --text3:#686888;
  --accent:#6c5ce7; --accent2:#a78bfa;
  --critical:#ef4444; --high:#f97316; --medium:#eab308; --low:#22c55e;
  --border:#22223a; --radius:6px; --radius-lg:10px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
  --transition:150ms ease;
  --theme-icon:'☀';
}
[data-theme="light"]{
  --bg:#f8f6f2; --bg2:#f0ede8; --bg3:#e8e4dc; --bg4:#dcd7ce;
  --text:#1a1815; --text2:#5a554a; --text3:#8a8278;
  --accent:#5b4fd4; --accent2:#3d2fa8;
  --critical:#c93030; --high:#bc5a26; --medium:#a67c18; --low:#287a3e;
  --border:#dcd7ce; --radius:6px; --radius-lg:10px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
  --transition:150ms ease;
  --theme-icon:'☾';
}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;min-height:100vh;transition:background 0.4s ease,color 0.4s ease}
html{transition:background 0.4s ease}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}

/* =========== HEADER =========== */
.header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);
}
.header-logo{display:flex;align-items:center;gap:12px;font-weight:700;font-size:18px}
.header-logo .pulse{width:10px;height:10px;border-radius:50%;background:var(--low);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header-meta{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--text2)}
.header-meta strong{color:var(--text);font-family:var(--mono)}
.version-tag{background:var(--bg3);padding:4px 10px;border-radius:var(--radius);font-size:12px;font-family:var(--mono)}

/* Theme toggle */
.theme-toggle-btn{
  width:32px;height:32px;border-radius:50%;
  border:1.5px solid var(--border);background:var(--bg2);
  color:var(--text2);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s ease;flex-shrink:0
}
.theme-toggle-btn:hover{
  border-color:var(--accent);color:var(--accent2);
  box-shadow:0 0 16px rgba(108,92,231,0.15);
  transform:rotate(15deg)
}
.theme-toggle-btn:active{transform:scale(0.92) rotate(0deg)}

/* =========== LAYOUT =========== */
.app{display:flex;height:calc(100vh - 64px)}
.sidebar{width:280px;background:var(--bg2);border-right:1px solid var(--border);
  overflow-y:auto;flex-shrink:0;padding:8px 0}
.main{flex:1;overflow-y:auto;padding:24px 32px}

/* =========== SIDEBAR =========== */
.sidebar-section{padding:4px 0}
.sidebar-section-title{
  padding:8px 24px;font-size:11px;text-transform:uppercase;letter-spacing:0.8px;
  color:var(--text3);font-weight:600
}

/* Module header - accordion trigger (SF Compass style) */
.module-header{
  font-size:11px;letter-spacing:0.8px;
  color:var(--text3);padding:12px 14px 8px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:all 0.2s ease;user-select:none;
  border-radius:6px;margin:2px 6px
}
.module-header:hover{color:var(--accent2);background:rgba(108,92,231,0.04)}
.module-header.open{color:var(--accent2)}
.module-header .mod-icon{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.module-header .mod-chevron{
  margin-left:auto;font-size:10px;transition:transform 0.25s ease;opacity:0.5
}
.module-header.open .mod-chevron{transform:rotate(90deg);opacity:1}
.module-header .mod-count{
  font-size:10px;background:var(--border);padding:2px 8px;border-radius:10px;
  font-weight:500;color:var(--text3)
}

/* Sub-items under expanded module (SF Compass cat-item style) */
.module-subitems{
  overflow:hidden;max-height:0;transition:max-height 0.35s ease
}
.module-subitems.open{max-height:800px}
.module-subitems .sub-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px 9px 28px;cursor:pointer;
  font-size:13px;border-radius:6px;margin-bottom:2px;margin-left:6px;margin-right:6px;
  transition:all 0.2s ease;color:var(--text3);font-weight:450
}
.module-subitems .sub-item:hover{background:rgba(128,128,128,0.06);color:var(--text)}
.module-subitems .sub-item.active{
  background:rgba(108,92,231,0.08);color:var(--accent2);font-weight:550;
  box-shadow:inset 1px 0 0 var(--accent)
}
.sub-item .sub-count{
  margin-left:auto;font-size:10px;background:var(--border);padding:3px 8px;
  border-radius:10px;font-weight:500
}
.sub-item .sub-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sub-item .sub-dot.critical{background:var(--critical)}
.sub-item .sub-dot.high{background:var(--high)}
.sub-item .sub-dot.medium{background:var(--medium)}
.sub-item .sub-dot.low{background:var(--low)}

/* All Updates item */
.sidebar-all{
  display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;
  font-size:13px;border-radius:6px;margin:2px 8px 8px;
  transition:all 0.2s ease;color:var(--text);font-weight:550
}
.sidebar-all:hover{background:var(--bg3)}
.sidebar-all .all-count{
  margin-left:auto;font-size:10px;background:var(--border);padding:3px 8px;
  border-radius:10px;font-weight:500
}

/* =========== SEARCH & FILTER =========== */
.toolbar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.search-box{
  flex:1;min-width:240px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 16px;color:var(--text);font-size:14px;outline:none;
  font-family:var(--font);transition:var(--transition)
}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--text3)}
.filter-group{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{
  padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);
  color:var(--text2);cursor:pointer;font-size:12px;transition:var(--transition);white-space:nowrap;
  font-family:var(--font)
}
.filter-btn:hover{background:var(--bg3);color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-btn.active.critical{background:var(--critical);border-color:var(--critical)}
.filter-btn.active.high{background:var(--high);border-color:var(--high)}
.filter-btn.active.medium{background:var(--medium);border-color:var(--medium)}
.filter-btn.active.low{background:var(--low);border-color:var(--low)}

/* =========== STATS BAR =========== */
.stats-bar{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.stat{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:12px 20px;display:flex;align-items:center;gap:12px;font-size:13px
}
.stat-count{font-size:24px;font-weight:700;font-family:var(--mono)}
.stat-label{color:var(--text2);font-size:11px}

/* =========== ACCORDION =========== */
.module-group{margin-bottom:8px}
.module-group-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-lg);cursor:pointer;transition:var(--transition);
  user-select:none
}
.module-group-header:hover{background:var(--bg3)}
.module-group-header .title{font-weight:600;font-size:15px}
.module-group-header .badges{display:flex;gap:8px}
.module-group-header .chevron{transition:transform var(--transition);color:var(--text3);font-size:18px}
.module-group-header .chevron.open{transform:rotate(90deg)}
.module-group-body{display:none;padding-top:4px}
.module-group-body.open{display:block}

/* =========== UPDATE CARDS =========== */
.update-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 20px;margin-bottom:6px;transition:var(--transition);
  border-left:4px solid transparent
}
.update-card:hover{background:var(--bg3)}
.update-card.critical{border-left-color:var(--critical)}
.update-card.high{border-left-color:var(--high)}
.update-card.medium{border-left-color:var(--medium)}
.update-card.low{border-left-color:var(--low)}

.update-card .card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.update-card .card-title{font-weight:600;font-size:14px;line-height:1.4;flex:1}
.update-card .impact-badge{
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;
  text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0
}
.impact-badge.critical{background:var(--critical);color:#fff}
.impact-badge.high{background:var(--high);color:#000}
.impact-badge.medium{background:var(--medium);color:#000}
.impact-badge.low{background:var(--low);color:#000}

.update-card .card-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px;font-size:12px}
.meta-tag{
  padding:2px 8px;border-radius:4px;font-size:11px;font-family:var(--mono);
  background:var(--bg4);color:var(--text2)
}
.meta-tag.action-new{background:#064e3b;color:#6ee7b7}
.meta-tag.action-changed{background:#1e3a5f;color:#93c5fd}
.meta-tag.action-deprecated{background:#7f1d1d;color:#fca5a5}
.meta-tag.action-deleted{background:#7f1d1d;color:#fca5a5}

.update-card .card-desc{color:var(--text2);font-size:13px;line-height:1.5;margin-bottom:10px}

/* Plain English section */
.update-card .plain-english{
  background:var(--bg4);border-radius:var(--radius);padding:10px 14px;
  font-size:12px;line-height:1.5;color:var(--text);border-left:3px solid var(--accent)
}
.plain-english-label{font-weight:600;color:var(--accent2);margin-bottom:4px;font-size:11px;letter-spacing:0.3px}

.update-card .card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:11px;color:var(--text3)}
.sap-link{padding:4px 10px;border-radius:4px;background:var(--bg4);color:var(--accent2);font-size:11px;transition:var(--transition)}
.sap-link:hover{background:var(--accent);color:#fff;text-decoration:none}

/* =========== RESPONSIVE =========== */
@media(max-width:768px){
  .app{flex-direction:column}
  .sidebar{width:100%;max-height:200px;border-right:none;border-bottom:1px solid var(--border)}
  .main{padding:16px}
  .header{padding:0 16px}
  .toolbar{flex-direction:column}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">
    <span class="pulse"></span>
    SF Update Pulse
  </div>
  <div class="header-meta">
    <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle light/dark theme" aria-label="Toggle theme">☀</button>
    <span>Last updated: <strong id="last-updated">-</strong></span>
    <span class="version-tag" id="version-tag">1H 2026</span>
  </div>
</header>

<div class="app">
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div class="toolbar">
      <input type="text" class="search-box" id="search" placeholder="Search updates, modules, features…" autofocus>
      <div class="filter-group" id="impact-filters">
        <button class="filter-btn active" data-impact="all">All</button>
        <button class="filter-btn critical" data-impact="critical">Critical</button>
        <button class="filter-btn high" data-impact="high">High</button>
        <button class="filter-btn medium" data-impact="medium">Medium</button>
        <button class="filter-btn low" data-impact="low">Low</button>
      </div>
      <div class="filter-group" id="action-filters">
        <button class="filter-btn active" data-action="all">All Actions</button>
        <button class="filter-btn" data-action="new">New</button>
        <button class="filter-btn" data-action="changed">Changed</button>
        <button class="filter-btn" data-action="deprecated">Deprecated</button>
        <button class="filter-btn" data-action="deleted">Deleted</button>
      </div>
    </div>

    <div class="stats-bar" id="stats-bar"></div>
    <div id="content"></div>
  </main>
</div>

<script>
// ── Theme ──
(function initTheme() {
  const saved = localStorage.getItem('sf-update-pulse-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  updateThemeIcon();
})();

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('sf-update-pulse-theme', next);
  updateThemeIcon();
}

function updateThemeIcon() {
  const btn = document.querySelector('.theme-toggle-btn');
  if (btn) btn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '☾' : '☀';
}

// ── Data layer ──
let allItems = [];
let activeModule = null;
let activeImpacts = new Set(['all']);
let activeActions = new Set(['all']);
let searchQuery = '';

// ── Load data ──
async function loadData() {
  try {
    const resp = await fetch('data/updates.json');
    if (!resp.ok) throw new Error('Data file not found');
    const data = await resp.json();
    allItems = data.items || [];
    document.getElementById('last-updated').textContent = data.metadata?.lastScraped || '-';
    render();
  } catch(e) {
    // Use embedded sample data for demo
    allItems = getSampleData();
    document.getElementById('last-updated').textContent = 'Demo data';
    render();
  }
}

// ── Filtering ──
function getFilteredItems() {
  return allItems.filter(item => {
    // Impact filter (pill buttons)
    if (!activeImpacts.has('all') && !activeImpacts.has(item.impact.level)) return false;
    // Action filter (pill buttons) - only if no sidebar sub-action selected
    if (!activeAction && !activeActions.has('all') && !activeActions.has(item.action.toLowerCase())) return false;
    // Sidebar action filter (takes priority over pill buttons)
    if (activeAction && item.action.toLowerCase() !== activeAction) return false;
    // Search
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const haystack = [item.title, item.description, item.module, item.product, item.feature, item.lifecycle].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    // Module filter
    if (activeModule && item.module !== activeModule) return false;
    return true;
  });
}

// ── Group by module ──
function groupByModule(items) {
  const groups = {};
  for (const item of items) {
    const mod = item.module || 'Other';
    if (!groups[mod]) groups[mod] = [];
    groups[mod].push(item);
  }
  // Sort groups alphabetically
  return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]));
}

// ── Render ──
function render() {
  renderSidebar();
  renderStats();
  renderContent();
}

// ── Sidebar state ──
let activeAction = null;  // 'new', 'changed', 'deprecated', 'deleted', or null

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const groups = groupByModule(allItems);
  
  // Count actions per module
  const modStats = {};
  for (const item of allItems) {
    const m = item.module || 'Other';
    if (!modStats[m]) modStats[m] = {total:0, new:0, changed:0, deprecated:0, deleted:0};
    modStats[m].total++;
    const act = item.action.toLowerCase();
    if (modStats[m][act] !== undefined) modStats[m][act]++;
  }

  let html = '';
  
  // "All Updates" at top (SF Compass style)
  html += `<div class="sidebar-all" data-module="" data-action="" onclick="selectSidebarModule('', '', this)">
    <span style="font-size:15px;width:20px;text-align:center">🏠</span> All Updates
    <span class="all-count">${allItems.length}</span>
  </div>`;
  
  // Module headers with accordion
  for (const [mod, items] of groups) {
    const stats = modStats[mod] || {total:items.length, new:0, changed:0, deprecated:0, deleted:0};
    const isOpen = activeModule === mod;
    
    // Module icon based on module name
    let icon = '📦';
    if (mod.includes('Employee')) icon = '👤';
    else if (mod.includes('Compensation') || mod.includes('Variable')) icon = '💰';
    else if (mod.includes('Recruit') || mod.includes('Applicant') || mod.includes('Candidate') || mod.includes('Job Requisition')) icon = '🎯';
    else if (mod.includes('Onboard')) icon = '🚀';
    else if (mod.includes('Perform') || mod.includes('Goal') || mod.includes('Continuous')) icon = '📊';
    else if (mod.includes('Learn')) icon = '📚';
    else if (mod.includes('Succession') || mod.includes('Career') || mod.includes('Talent')) icon = '🔄';
    else if (mod.includes('Platform') || mod.includes('System') || mod.includes('Foundation')) icon = '⚙️';
    else if (mod.includes('Integration')) icon = '🔌';
    else if (mod.includes('Report') || mod.includes('Analytics')) icon = '📈';
    else if (mod.includes('Time')) icon = '⏰';
    else if (mod.includes('Payroll')) icon = '💵';
    else if (mod.includes('Identity') || mod.includes('Security')) icon = '🔐';
    else if (mod.includes('Mobile')) icon = '📱';
    else if (mod.includes('User Experience')) icon = '🎨';
    else if (mod.includes('Localization') || mod.includes('Global')) icon = '🌍';
    else if (mod.includes('Opportunity') || mod.includes('Marketplace')) icon = '🛒';
    else if (mod.includes('Content') || mod.includes('Document')) icon = '📄';
    else if (mod.includes('Benefit')) icon = '🎁';
    else if (mod.includes('Calibration')) icon = '⚖️';
    else if (mod.includes('360')) icon = '🔄';
    else if (mod.includes('Process') || mod.includes('Automation')) icon = '🤖';
    else if (mod.includes('Reward') || mod.includes('Recognition')) icon = '🏆';
    else if (mod.includes('Presentation')) icon = '📽️';
    
    // Count critical & high for color indicator
    const critCount = items.filter(i => i.impact.level === 'critical').length;
    const highCount = items.filter(i => i.impact.level === 'high').length;
    let dotClass = 'low';
    if (critCount > 0) dotClass = 'critical';
    else if (highCount > 0) dotClass = 'high';
    
    html += `<div class="module-header${isOpen ? ' open' : ''}" onclick="selectSidebarModule('${escHtml(mod)}', '', this)" data-module="${escHtml(mod)}">
      <span class="mod-icon">${icon}</span>
      <span class="sub-dot ${dotClass}" style="width:7px;height:7px"></span>
      ${escHtml(mod)}
      <span class="mod-count">${stats.total}</span>
      <span class="mod-chevron">▸</span>
    </div>`;
    
    // Sub-items: action types
    html += `<div class="module-subitems${isOpen ? ' open' : ''}" data-module="${escHtml(mod)}">
      <div class="sub-item${activeModule === mod && activeAction === 'new' ? ' active' : ''}" data-module="${escHtml(mod)}" data-action="new" onclick="event.stopPropagation();selectSidebarModule('${escHtml(mod)}', 'new', this)">
        <span style="color:#6ee7b7;font-size:10px">●</span> New
        <span class="sub-count">${stats.new || 0}</span>
      </div>
      <div class="sub-item${activeModule === mod && activeAction === 'changed' ? ' active' : ''}" data-module="${escHtml(mod)}" data-action="changed" onclick="event.stopPropagation();selectSidebarModule('${escHtml(mod)}', 'changed', this)">
        <span style="color:#93c5fd;font-size:10px">●</span> Changed
        <span class="sub-count">${stats.changed || 0}</span>
      </div>
      <div class="sub-item${activeModule === mod && activeAction === 'deprecated' ? ' active' : ''}" data-module="${escHtml(mod)}" data-action="deprecated" onclick="event.stopPropagation();selectSidebarModule('${escHtml(mod)}', 'deprecated', this)">
        <span style="color:#fca5a5;font-size:10px">●</span> Deprecated
        <span class="sub-count">${stats.deprecated || 0}</span>
      </div>
      <div class="sub-item${activeModule === mod && activeAction === 'deleted' ? ' active' : ''}" data-module="${escHtml(mod)}" data-action="deleted" onclick="event.stopPropagation();selectSidebarModule('${escHtml(mod)}', 'deleted', this)">
        <span style="color:#ef4444;font-size:10px">●</span> Deleted
        <span class="sub-count">${stats.deleted || 0}</span>
      </div>
    </div>`;
  }
  
  sidebar.innerHTML = html;
}

function toggleSidebarModule(header) {
  const modName = header.getAttribute('data-module');
  const subitems = document.querySelector(`.module-subitems[data-module="${CSS.escape(modName)}"]`);
  if (!subitems) return;
  const isOpen = subitems.classList.contains('open');
  
  // Close all others
  document.querySelectorAll('.module-subitems.open').forEach(c => c.classList.remove('open'));
  document.querySelectorAll('.module-header.open').forEach(h => h.classList.remove('open'));
  
  if (!isOpen) {
    subitems.classList.add('open');
    header.classList.add('open');
  }
}

function selectSidebarModule(moduleName, actionName, el) {
  activeModule = moduleName || null;
  activeAction = actionName || null;
  
  // Update sidebar active states
  document.querySelectorAll('.sidebar-all, .sub-item').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');
  
  // If "All" selected
  if (!moduleName && !actionName) {
    document.querySelector('.sidebar-all')?.classList.add('active');
  }
  
  // If module clicked without action: expand accordion + filter to module
  if (moduleName && !actionName) {
    // Expand this module's sub-items
    document.querySelectorAll('.module-subitems.open').forEach(c => c.classList.remove('open'));
    document.querySelectorAll('.module-header.open').forEach(h => h.classList.remove('open'));
    const subitems = document.querySelector(`.module-subitems[data-module="${CSS.escape(moduleName)}"]`);
    const header = document.querySelector(`.module-header[data-module="${CSS.escape(moduleName)}"]`);
    if (subitems) subitems.classList.add('open');
    if (header) header.classList.add('open');
  }
  
  render();
}

function renderStats() {
  const filtered = getFilteredItems();
  const crit = filtered.filter(i => i.impact.level === 'critical').length;
  const high = filtered.filter(i => i.impact.level === 'high').length;
  const med = filtered.filter(i => i.impact.level === 'medium').length;
  const low = filtered.filter(i => i.impact.level === 'low').length;
  
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><span class="stat-count">${filtered.length}</span><span class="stat-label">Updates</span></div>
    <div class="stat"><span class="stat-count" style="color:var(--critical)">${crit}</span><span class="stat-label">Critical</span></div>
    <div class="stat"><span class="stat-count" style="color:var(--high)">${high}</span><span class="stat-label">High</span></div>
    <div class="stat"><span class="stat-count" style="color:var(--medium)">${med}</span><span class="stat-label">Medium</span></div>
    <div class="stat"><span class="stat-count" style="color:var(--low)">${low}</span><span class="stat-label">Low</span></div>
  `;
}

function renderContent() {
  const container = document.getElementById('content');
  const filtered = getFilteredItems();
  const groups = groupByModule(filtered);

  if (!filtered.length) {
    container.innerHTML = `<div style="text-align:center;padding:60px;color:var(--text3)">
      <div style="font-size:48px;margin-bottom:16px">🔍</div>
      <div style="font-size:16px">No updates match your filters</div>
      <div style="font-size:13px;margin-top:8px">Try adjusting your search or filter criteria</div>
    </div>`;
    return;
  }

  let html = '';
  for (const [mod, items] of groups) {
    const id = 'mod-' + mod.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
    
    // Count impacts
    const crit = items.filter(i => i.impact.level === 'critical').length;
    const high = items.filter(i => i.impact.level === 'high').length;
    
    let badgesHtml = '';
    if (crit) badgesHtml += `<span style="background:var(--critical);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">${crit} critical</span>`;
    if (high) badgesHtml += `<span style="background:var(--high);color:#000;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">${high} high</span>`;

    html += `<div class="module-group">
      <div class="module-group-header" data-target="${id}">
        <span class="title">${escHtml(mod)}</span>
        <div style="display:flex;align-items:center;gap:12px">
          <span class="badges">${badgesHtml}</span>
          <span style="color:var(--text3);font-size:12px;font-family:var(--mono)">${items.length} updates</span>
          <span class="chevron" data-target="${id}">▶</span>
        </div>
      </div>
      <div class="module-group-body open" id="${id}">`;

    for (const item of items) {
      const actionClass = 'action-' + item.action.toLowerCase();
      html += `
      <div class="update-card ${item.impact.level}">
        <div class="card-header">
          <span class="card-title">${escHtml(item.title)}</span>
          <span class="impact-badge ${item.impact.level}">${item.impact.label}</span>
        </div>
        <div class="card-meta">
          <span class="meta-tag ${actionClass}">${item.action}</span>
          <span class="meta-tag">${escHtml(item.enablement)}</span>
          ${item.product ? `<span class="meta-tag">${escHtml(item.product)}</span>` : ''}
          ${item.lifecycle ? `<span class="meta-tag">${escHtml(item.lifecycle)}</span>` : ''}
          ${item.version ? `<span class="meta-tag">${escHtml(item.version)}</span>` : ''}
        </div>
        <div class="card-desc">${item.description.replace(/See More.*$/i, '')}</div>
        ${item.plainEnglish ? `
        <div class="plain-english">
          <div class="plain-english-label">💡 What this means for you</div>
          ${escHtml(item.plainEnglish)}
        </div>` : ''}
        <div class="card-footer">
          <span>${item.refNumber ? 'Ref: ' + escHtml(item.refNumber) : ''}</span>
          ${item.sapLink ? `<a href="${escHtml(fixSapLink(item.sapLink))}" target="_blank" rel="noopener" class="sap-link">View on SAP →</a>` : ''}
        </div>
      </div>`;
    }

    html += `</div></div>`;
  }
  
  container.innerHTML = html;
  
  // Accordion toggle
  container.querySelectorAll('.module-group-header').forEach(header => {
    header.addEventListener('click', () => {
      const target = header.dataset.target;
      const body = document.getElementById(target);
      const chevron = header.querySelector('.chevron');
      if (body) {
        body.classList.toggle('open');
        chevron?.classList.toggle('open');
      }
    });
  });
}

// ── Event listeners ──
document.getElementById('search').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  render();
});

document.getElementById('impact-filters').addEventListener('click', (e) => {
  if (!e.target.dataset.impact) return;
  const impact = e.target.dataset.impact;
  
  if (impact === 'all') {
    activeImpacts = new Set(['all']);
  } else {
    activeImpacts.delete('all');
    if (activeImpacts.has(impact)) {
      activeImpacts.delete(impact);
    } else {
      activeImpacts.add(impact);
    }
    if (!activeImpacts.size) activeImpacts = new Set(['all']);
  }
  
  // Update button states
  document.querySelectorAll('#impact-filters .filter-btn').forEach(btn => {
    btn.classList.toggle('active', activeImpacts.has(btn.dataset.impact));
  });
  
  render();
});

document.getElementById('action-filters').addEventListener('click', (e) => {
  if (!e.target.dataset.action) return;
  const action = e.target.dataset.action;
  
  if (action === 'all') {
    activeActions = new Set(['all']);
  } else {
    activeActions.delete('all');
    if (activeActions.has(action)) {
      activeActions.delete(action);
    } else {
      activeActions.add(action);
    }
    if (!activeActions.size) activeActions = new Set(['all']);
  }
  
  document.querySelectorAll('#action-filters .filter-btn').forEach(btn => {
    btn.classList.toggle('active', activeActions.has(btn.dataset.action));
  });
  
  render();
});

function fixSapLink(link) {
  if (!link) return '';
  if (link.startsWith('/')) return 'https://help.sap.com' + link;
  return link;
}

// ── Utilities ──
function escHtml(s) {
  if (!s) return '';
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

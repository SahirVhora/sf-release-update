    <link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
/* =========== RESET & BASE =========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="dark"]{
  --bg:#090d14; --bg2:#0d1119; --bg3:#111620; --bg4:#171c28;
  --text:#e6e9f0; --text2:#c5c9d4; --text3:#5f6675;
  --accent:#c8a84e; --accent2:#e0c46e;
  --critical:#e05151; --high:#e07b3c; --medium:#d4a434; --low:#3fb96b;
  --border:#1c212b; --radius:6px; --radius-lg:10px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
  --transition:150ms ease;
  --theme-icon:'☀';
}
[data-theme="light"]{
  --bg:#f8f6f2; --bg2:#f0ede8; --bg3:#e8e4dc; --bg4:#dcd7ce;
  --text:#1a1815; --text2:#5a554a; --text3:#8a8278;
  --accent:#5b4fd4; --accent2:#3d2fa8;
  --critical:#c93030; --high:#bc5a26; --medium:#a67c18; --low:#287a3e;
  --border:#dcd7ce; --radius:6px; --radius-lg:10px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
  --transition:150ms ease;
  --theme-icon:'☾';
}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;min-height:100vh;transition:background 0.4s ease,color 0.4s ease}
html{transition:background 0.4s ease}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}

/* =========== HEADER =========== */
.header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);
}
.header-logo{display:flex;align-items:center;gap:12px;font-weight:700;font-size:18px}
.header-logo .pulse{width:10px;height:10px;border-radius:50%;background:var(--low);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header-meta{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--text2)}
.header-meta strong{color:var(--text);font-family:var(--mono)}
.version-tag{background:var(--bg3);padding:4px 10px;border-radius:var(--radius);font-size:12px;font-family:var(--mono)}

/* Theme toggle */
.theme-toggle-btn{
  width:32px;height:32px;border-radius:50%;
  border:1.5px solid var(--border);background:var(--bg2);
  color:var(--text2);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s ease;flex-shrink:0
}
.theme-toggle-btn:hover{
  border-color:var(--accent);color:var(--accent2);
  box-shadow:0 0 16px rgba(200,168,78,0.15);
  transform:rotate(15deg)
}
.theme-toggle-btn:active{transform:scale(0.92) rotate(0deg)}

/* Version switcher */
.version-switcher{display:flex;gap:4px;background:var(--bg3);padding:3px;border-radius:8px}
.ver-btn{
  padding:5px 12px;border-radius:6px;border:none;background:transparent;
  color:var(--text3);font-size:11px;cursor:pointer;font-family:var(--font);
  font-weight:500;transition:all 0.2s ease;white-space:nowrap
}
.ver-btn:hover{color:var(--text);background:var(--bg4)}
.ver-btn.active{background:var(--accent);color:#fff;font-weight:600}
.ver-btn span{margin-left:4px;font-family:var(--mono);opacity:.8}
.ver-btn.upcoming{position:relative}
.ver-btn.upcoming::after{
  content:'preview';position:absolute;top:-6px;right:-4px;
  background:var(--medium);color:#000;font-size:8px;padding:1px 5px;
  border-radius:6px;font-weight:600;letter-spacing:0.3px
}

/* Release timeline */
.release-timeline{
  display:flex;gap:24px;padding:8px 24px;background:var(--bg2);border-bottom:1px solid var(--border);
  font-size:11px;color:var(--text3)
}
.release-timeline strong{color:var(--text2)}
.release-timeline .phase{display:flex;align-items:center;gap:6px}
.release-timeline .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.release-timeline .dot.preview{background:var(--medium)}
.release-timeline .dot.production{background:var(--low)}

/* =========== LAYOUT =========== */
.app{display:flex;height:calc(100vh - 64px)}
.sidebar{width:280px;background:var(--bg2);border-right:1px solid var(--border);
  overflow-y:auto;flex-shrink:0;padding:8px 0}
.main{flex:1;overflow-y:auto;padding:24px 32px}

/* =========== SIDEBAR =========== */
.sidebar-section{padding:4px 0}
.sidebar-section-title{
  padding:8px 24px;font-size:11px;text-transform:uppercase;letter-spacing:0.8px;
  color:var(--text3);font-weight:600
}

/* Module header - accordion trigger (SF Compass style) */
.module-header{
  font-size:11px;letter-spacing:0.8px;
  color:var(--text3);padding:12px 14px 8px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:all 0.2s ease;user-select:none;
  border-radius:6px;margin:2px 6px
}
.module-header:hover{color:var(--accent2);background:rgba(200,168,78,0.04)}
.module-header.open{color:var(--accent2)}
.module-header .mod-icon{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.module-header .mod-chevron{
  margin-left:auto;font-size:10px;transition:transform 0.25s ease;opacity:0.5
}
.module-header.open .mod-chevron{transform:rotate(90deg);opacity:1}
.module-header .mod-count{
  font-size:10px;background:var(--border);padding:2px 8px;border-radius:10px;
  font-weight:500;color:var(--text3)
}

/* Sub-items under expanded module (SF Compass cat-item style) */
.module-subitems{
  overflow:hidden;max-height:0;transition:max-height 0.35s ease
}
.module-subitems.open{max-height:800px}
.module-subitems .sub-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px 9px 28px;cursor:pointer;
  font-size:13px;border-radius:6px;margin-bottom:2px;margin-left:6px;margin-right:6px;
  transition:all 0.2s ease;color:var(--text3);font-weight:450
}
.module-subitems .sub-item:hover{background:rgba(128,128,128,0.06);color:var(--text)}
.module-subitems .sub-item.active{
  background:rgba(200,168,78,0.08);color:var(--accent2);font-weight:550;
  box-shadow:inset 1px 0 0 var(--accent)
}
.sub-item .sub-count{
  margin-left:auto;font-size:10px;background:var(--border);padding:3px 8px;
  border-radius:10px;font-weight:500
}
.sub-item .sub-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sub-item .sub-dot.critical{background:var(--critical)}
.sub-item .sub-dot.high{background:var(--high)}
.sub-item .sub-dot.medium{background:var(--medium)}
.sub-item .sub-dot.low{background:var(--low)}

/* All Updates item */
.sidebar-all{
  display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;
  font-size:13px;border-radius:6px;margin:2px 8px 8px;
  transition:all 0.2s ease;color:var(--text);font-weight:550
}
.sidebar-all:hover{background:var(--bg3)}
.sidebar-all .all-count{
  margin-left:auto;font-size:10px;background:var(--border);padding:3px 8px;
  border-radius:10px;font-weight:500
}

/* =========== SEARCH & FILTER =========== */
.toolbar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.search-box{
  flex:1;min-width:240px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 16px;color:var(--text);font-size:14px;outline:none;
  font-family:var(--font);transition:var(--transition)
}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--text3)}
.filter-group{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{
  padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);
  color:var(--text2);cursor:pointer;font-size:12px;transition:var(--transition);white-space:nowrap;
  font-family:var(--font)
}
.filter-btn:hover{background:var(--bg3);color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-btn.active.critical{background:var(--critical);border-color:var(--critical)}
.filter-btn.active.high{background:var(--high);border-color:var(--high)}
.filter-btn.active.medium{background:var(--medium);border-color:var(--medium)}
.filter-btn.active.low{background:var(--low);border-color:var(--low)}

/* =========== STATS BAR =========== */
.stats-bar{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.stat{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:12px 20px;display:flex;align-items:center;gap:12px;font-size:13px
}
.stat-count{font-size:24px;font-weight:700;font-family:var(--mono)}
.stat-label{color:var(--text2);font-size:11px}

/* =========== ACCORDION =========== */
.module-group{margin-bottom:8px}
.module-group-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-lg);cursor:pointer;transition:var(--transition);
  user-select:none
}
.module-group-header:hover{background:var(--bg3)}
.module-group-header .title{font-weight:600;font-size:15px}
.module-group-header .badges{display:flex;gap:8px}
.module-group-header .chevron{transition:transform var(--transition);color:var(--text3);font-size:18px}
.module-group-header .chevron.open{transform:rotate(90deg)}
.module-group-body{display:none;padding-top:4px}
.module-group-body.open{display:block}

/* =========== UPDATE CARDS =========== */
.update-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 20px;margin-bottom:6px;transition:var(--transition);
  border-left:4px solid transparent
}
.update-card:hover{background:var(--bg3)}
.update-card.critical{border-left-color:var(--critical)}
.update-card.high{border-left-color:var(--high)}
.update-card.medium{border-left-color:var(--medium)}
.update-card.low{border-left-color:var(--low)}

.update-card .card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.update-card .card-title{font-weight:600;font-size:14px;line-height:1.4;flex:1}
.update-card .impact-badge{
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;
  text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0
}
.impact-badge.critical{background:var(--critical);color:#fff}
.impact-badge.high{background:var(--high);color:#000}
.impact-badge.medium{background:var(--medium);color:#000}
.impact-badge.low{background:var(--low);color:#000}

.update-card .card-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px;font-size:12px}
.meta-tag{
  padding:2px 8px;border-radius:4px;font-size:11px;font-family:var(--mono);
  background:var(--bg4);color:var(--text2)
}
.meta-tag.action-new{background:#064e3b;color:#6ee7b7}
.meta-tag.action-changed{background:#1e3a5f;color:#93c5fd}
.meta-tag.action-deprecated{background:#7f1d1d;color:#fca5a5}
.meta-tag.action-deleted{background:#7f1d1d;color:#fca5a5}

.update-card .card-desc{color:var(--text2);font-size:13px;line-height:1.5;margin-bottom:10px}
.card-source-fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:6px;margin:8px 0 10px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,0.02);font-size:11px;color:var(--text3)}
.card-source-fields span{min-width:0;overflow-wrap:anywhere}
.card-source-fields strong{display:block;color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}

/* Plain English section */
.update-card .plain-english{
  background:var(--bg4);border-radius:var(--radius);padding:10px 14px;
  font-size:12px;line-height:1.5;color:var(--text);border-left:3px solid var(--accent)
}
.plain-english-label{font-weight:600;color:var(--accent2);margin-bottom:4px;font-size:11px;letter-spacing:0.3px}

.update-card .card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:11px;color:var(--text3)}
.sap-link{padding:4px 10px;border-radius:4px;background:var(--bg4);color:var(--accent2);font-size:11px;transition:var(--transition)}
.sap-link:hover{background:var(--accent);color:#fff;text-decoration:none}

/* =========== RESPONSIVE =========== */
@media(max-width:768px){
  .app{flex-direction:column}
  .sidebar{width:100%;max-height:200px;border-right:none;border-bottom:1px solid var(--border)}
  .main{padding:16px}
  .header{padding:0 16px}
  .toolbar{flex-direction:column}
}

/* =========== CHECKLIST =========== */
.checklist-btn{
  padding:6px 14px;border-radius:20px;border:1.5px solid var(--accent);background:transparent;
  color:var(--accent);cursor:pointer;font-size:12px;font-weight:600;transition:all 0.2s ease;
  font-family:var(--font);white-space:nowrap;display:flex;align-items:center;gap:6px
}
.checklist-btn:hover{background:var(--accent);color:#fff}
.checklist-btn .badge{
  background:var(--critical);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;
  font-weight:700;min-width:18px;text-align:center
}

/* Module selector modal */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:200;
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn 0.2s ease
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.modal-panel{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);
  width:520px;max-height:80vh;display:flex;flex-direction:column;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);animation:slideUp 0.25s ease
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.modal-header{
  display:flex;align-items:center;justify-content:space-between;padding:20px 24px;
  border-bottom:1px solid var(--border)
}
.modal-header h2{font-size:18px;font-weight:700}
.modal-close{
  width:28px;height:28px;border-radius:50%;border:none;background:var(--bg3);
  color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;
  justify-content:center;transition:all 0.2s
}
.modal-close:hover{background:var(--critical);color:#fff}

.modal-body{padding:16px 24px;overflow-y:auto;flex:1}
.modal-footer{
  padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:12px;
  justify-content:flex-end
}

/* Module selector */
.mod-select-item{
  display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;
  cursor:pointer;transition:background 0.15s;font-size:13px
}
.mod-select-item:hover{background:var(--bg3)}
.mod-select-item input[type="checkbox"]{
  width:16px;height:16px;accent-color:var(--accent);flex-shrink:0
}
.mod-select-name{flex:1;color:var(--text)}
.mod-select-count{
  font-size:11px;background:var(--bg4);padding:2px 8px;border-radius:10px;
  color:var(--text2);font-family:var(--mono);flex-shrink:0
}

/* Quick select buttons */
.qs-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.qs-btn{
  padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);
  color:var(--text2);cursor:pointer;font-size:11px;transition:all 0.2s;font-family:var(--font)
}
.qs-btn:hover{background:var(--bg4);color:var(--text)}

/* Primary/generate button */
.btn-primary{
  padding:10px 24px;border-radius:8px;border:none;background:var(--accent);color:#000;
  cursor:pointer;font-size:14px;font-weight:600;transition:all 0.2s;font-family:var(--font)
}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}

.btn-secondary{
  padding:10px 24px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);
  color:var(--text);cursor:pointer;font-size:14px;transition:all 0.2s;font-family:var(--font)
}
.btn-secondary:hover{background:var(--bg4)}

/* Checklist view */

/* Hide original view when checklist is active */
.main.checklist-active .original-view{display:none}

.checklist-view{display:none}
.checklist-view.active{display:block}


.checklist-header{
  display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap
}
.checklist-header h2{font-size:20px;font-weight:700;flex:1}
.back-btn{
  padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);
  color:var(--text2);cursor:pointer;font-size:12px;transition:all 0.2s;font-family:var(--font)
}
.back-btn:hover{background:var(--bg3);color:var(--text)}

/* Progress bar */
.progress-section{margin-bottom:24px}
.progress-bar-outer{
  height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-bottom:8px
}
.progress-bar-inner{
  height:100%;background:linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius:4px;transition:width 0.4s ease
}
.progress-text{
  display:flex;justify-content:space-between;font-size:12px;color:var(--text3)
}
.progress-text strong{color:var(--text);font-family:var(--mono)}

/* Checklist category sections */
.checklist-category{margin-bottom:20px}
.checklist-category-header{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);
  cursor:pointer;user-select:none;margin-bottom:4px
}
.checklist-category-header:hover{background:var(--bg3)}
.cat-icon{font-size:20px}
.cat-title{font-weight:600;font-size:15px;flex:1}
.cat-count{
  font-size:12px;font-family:var(--mono);color:var(--text2);
  padding:3px 10px;background:var(--bg4);border-radius:10px
}
.cat-chevron{transition:transform 0.2s;color:var(--text3);font-size:14px}
.cat-chevron.open{transform:rotate(90deg)}

/* Checklist items */
.checklist-items{padding-left:16px}
.checklist-item{
  display:flex;align-items:flex-start;gap:12px;padding:12px 16px;
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:4px;transition:all 0.2s
}
.checklist-item:hover{background:var(--bg3)}
.checklist-item.done{opacity:0.5}
.checklist-item.done .cl-title{text-decoration:line-through;color:var(--text3)}

.cl-checkbox{
  width:20px;height:20px;accent-color:var(--accent);flex-shrink:0;margin-top:2px;cursor:pointer
}
.cl-content{flex:1;min-width:0}
.cl-title{font-weight:600;font-size:13px;margin-bottom:4px;line-height:1.4}
.cl-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.cl-meta-tag{
  font-size:10px;padding:2px 8px;border-radius:4px;font-family:var(--mono)
}
.cl-action-tag{background:#7f1d1d;color:#fca5a5}
.cl-changed-tag{background:#1e3a5f;color:#93c5fd}
.cl-new-tag{background:#064e3b;color:#6ee7b7}
.cl-enablement-tag{background:var(--bg4);color:var(--text2)}
.cl-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:6px}
.cl-sap-link{font-size:11px;color:var(--accent2);text-decoration:none}
.cl-sap-link:hover{text-decoration:underline}

/* Export buttons */
.export-row{display:flex;gap:8px;margin-top:16px}
.export-btn{
  padding:8px 16px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);
  color:var(--text2);cursor:pointer;font-size:12px;transition:all 0.2s;font-family:var(--font)

<script>
// -- Theme --
(function initTheme() {
  const saved = localStorage.getItem('sf-release-update-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  updateThemeIcon();
})();

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('sf-release-update-theme', next);
  updateThemeIcon();
}

function updateThemeIcon() {
  const btn = document.querySelector('.theme-toggle-btn');
  if (btn) btn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '☾' : '☀';
}

// -- Data layer --
let allItems = [];
let activeModule = null;
let activeImpacts = new Set(['all']);
let activeActions = new Set(['all']);
let searchQuery = '';
let activeVersion = 'all';
let activeRole = 'all';
let lastExportText = '';
let lastExportTitle = 'release-impact-export';

function setMetaContent(selector, value) {
  const el = document.querySelector(selector);
  if (el) el.setAttribute('content', value);
}

function buildMetaSummary(metadata, items) {
  const total = metadata.totalItems || items.length || 0;
  const versionCounts = metadata.versionCounts || {};
  const versions = Object.keys(versionCounts).length ? Object.keys(versionCounts) : (metadata.availableVersions || []);
  const versionText = versions.length ? versions.join(', ') : 'the latest releases';
  const impactCounts = items.reduce((acc, item) => {
    const level = item.impact?.level || 'low';
    acc[level] = (acc[level] || 0) + 1;
    return acc;
  }, {});
  const impactText = impactCounts.critical || impactCounts.high
    ? ` ${impactCounts.critical || 0} critical and ${impactCounts.high || 0} high impact items.`
    : '';
  const refreshed = metadata.lastScraped ? ` Last refreshed ${metadata.lastScraped}.` : '';
  return `${total} SAP SuccessFactors release updates across ${versionText}, classified by impact and summarised in plain English.${impactText}${refreshed}`;
}

function updateDocumentMetadata(metadata, items) {
  const total = metadata.totalItems || items.length || 0;
  const title = `SAP SF Release Updates - ${total} SuccessFactors updates`;
  const description = buildMetaSummary(metadata, items);
  document.title = title;
  setMetaContent('meta[name="description"]', description);
  setMetaContent('meta[property="og:title"]', title);
  setMetaContent('meta[property="og:description"]', description);
  setMetaContent('meta[name="twitter:title"]', title);
  setMetaContent('meta[name="twitter:description"]', description);
}

// -- Load data --
async function loadData() {
  try {
    const resp = await fetch('data/updates.json');
    if (!resp.ok) throw new Error('Data file not found');
    const data = await resp.json();
    allItems = data.items || [];
    const metadata = data.metadata || {};
    updateDocumentMetadata(metadata, allItems);
    renderVersionSwitcher(metadata);
    renderReleaseTimeline(metadata);
    renderModuleSelector();
    applyUrlState();
    render();
  } catch(e) {
    // Use embedded sample data for demo
    allItems = getSampleData();
    const sampleMetadata = {availableVersions: ['1H 2026', '2H 2026 (Preview)'], totalItems: allItems.length, releaseDates: {'1H 2026': {preview:'April 2026', production:'May 15, 2026'}, '2H 2026': {preview:'October 2026 (est.)', production:'November 2026 (est.)'}}};
    updateDocumentMetadata(sampleMetadata, allItems);
    renderVersionSwitcher(sampleMetadata);
    renderReleaseTimeline(sampleMetadata);
    renderModuleSelector();
    applyUrlState();
    render();
  }
}

// -- Filtering --
function getFilteredItems() {
  return allItems.filter(item => {
    // Impact filter (pill buttons)
    if (!activeImpacts.has('all') && !activeImpacts.has(item.impact.level)) return false;
    // Action filter (pill buttons) - only if no sidebar sub-action selected
    if (!activeAction && !activeActions.has('all') && !activeActions.has(item.action.toLowerCase())) return false;
    // Sidebar action filter (takes priority over pill buttons)
    if (activeAction && item.action.toLowerCase() !== activeAction) return false;
    // Search
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const haystack = [item.title, item.description, item.module, item.product, item.feature, item.lifecycle].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    // Module filter
    if (activeModule && item.module !== activeModule) return false;
    // Version filter
    if (activeVersion !== 'all' && item.releaseVersion !== activeVersion) return false;
    // Role filter
    if (activeRole !== 'all' && !rolesForItem(item).includes(activeRole)) return false;
    return true;
  });
}

// -- Group by module --
function groupByModule(items) {
  const groups = {};
  for (const item of items) {
    const mod = item.module || 'Other';
    if (!groups[mod]) groups[mod] = [];
    groups[mod].push(item);
  }
  // Sort groups alphabetically
  return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]));
}

// -- Render --
function render() {
  enrichItems();
  syncUrlState();
  renderSidebar();
  renderRadarDashboard();
  renderStats();
  renderContent();
}

// -- Sidebar state --
let activeAction = null;  // 'new', 'changed', 'deprecated', 'deleted', or null

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  // Use version-filtered items for sidebar counts
  const versionItems = activeVersion === 'all' ? allItems : allItems.filter(i => i.releaseVersion === activeVersion);
  const groups = groupByModule(versionItems);
  
  // Count actions per module (from version-filtered items)
  const modStats = {};
  for (const item of versionItems) {
    const m = item.module || 'Other';
    if (!modStats[m]) modStats[m] = {total:0, new:0, changed:0, deprecated:0, deleted:0};
    modStats[m].total++;
    const act = item.action.toLowerCase();
    if (modStats[m][act] !== undefined) modStats[m][act]++;
  }

  let html = '';

function toggleSidebarModule(header) {
  const modName = header.getAttribute('data-module');
  const subitems = document.querySelector(`.module-subitems[data-module="${CSS.escape(modName)}"]`);
  if (!subitems) return;
  const isOpen = subitems.classList.contains('open');
  
  // Close all others
  document.querySelectorAll('.module-subitems.open').forEach(c => c.classList.remove('open'));
  document.querySelectorAll('.module-header.open').forEach(h => h.classList.remove('open'));
  
  if (!isOpen) {
    subitems.classList.add('open');
    header.classList.add('open');
  }
}

function selectSidebarModule(moduleName, actionName, el) {
  activeModule = moduleName || null;
  activeAction = actionName || null;
  
  // Update sidebar active states
  document.querySelectorAll('.sidebar-all, .sub-item').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');
  
  // If "All" selected
  if (!moduleName && !actionName) {
    document.querySelector('.sidebar-all')?.classList.add('active');
  }
  
  // If module clicked without action: expand accordion + filter to module
  if (moduleName && !actionName) {
    // Expand this module's sub-items
    document.querySelectorAll('.module-subitems.open').forEach(c => c.classList.remove('open'));
    document.querySelectorAll('.module-header.open').forEach(h => h.classList.remove('open'));
    const subitems = document.querySelector(`.module-subitems[data-module="${CSS.escape(moduleName)}"]`);
    const header = document.querySelector(`.module-header[data-module="${CSS.escape(moduleName)}"]`);
    if (subitems) subitems.classList.add('open');
    if (header) header.classList.add('open');
  }
  
  render();
}


function enrichItems() {
  for (const item of allItems) {
    if (item._radarReady) continue;
    item.impactScore = impactScore(item);
    item.radarFlags = radarFlags(item);
    item.testGuidance = testGuidance(item);
    item.recommendedAction = recommendedAction(item);
    item.audience = rolesForItem(item);
    item._radarReady = true;
  }
}

function impactScore(item) {
  const action = (item.action || '').toLowerCase();
  const enablement = (item.enablement || '').toLowerCase();
  const text = [item.title,item.description,item.lifecycle,item.feature,item.refNumber].join(' ').toLowerCase();
  let score = 0;
  if (action.includes('deleted') || text.includes('will be deleted')) score += 45;
  if (action.includes('deprecated') || text.includes('deprecated')) score += 38;
  if (enablement.includes('required')) score += 30;
  if (enablement.includes('automatically')) score += 25;
  if (enablement.includes('major')) score += 20;
  if (action.includes('changed')) score += 12;
  if (action.includes('new')) score += 6;
  if (/api|integration|permission|role|security|odata|identity|platform/.test(text)) score += 15;
  if (/employee central|job information|position|workflow|business rule/.test(text)) score += 12;
  if (/may 2027|november|production|preview|end of maintenance/.test(text)) score += 8;
  return Math.min(score, 100);
}

function radarFlags(item) {
  const text = [item.title,item.description,item.enablement,item.lifecycle,item.feature].join(' ').toLowerCase();
  const flags = [];
  if (/deprecated|deleted|end of maintenance/.test(text)) flags.push('Deprecation risk');
  if (/required|automatically on/.test(text)) flags.push('Action required');
  if (/api|integration|odata|replication|compound employee/.test(text)) flags.push('Integration impact');
  if (/permission|role|security|identity|authentication/.test(text)) flags.push('Security/admin impact');
  if (/job information|position|employee data|foundation object|workflow|business rule/.test(text)) flags.push('Data model impact');
  if (!flags.length) flags.push('Review in preview');
  return flags;
}

function rolesForItem(item) {
  const text = [item.title,item.description,item.module,item.lifecycle,item.feature,item.enablement].join(' ').toLowerCase();
  const roles = ['consultant'];
  if (/test|changed|required|automatically|major|deprecated|deleted/.test(text)) roles.push('test');
  if (/deprecated|deleted|required|automatically|major|business|experience|workflow/.test(text)) roles.push('product');
  if (/support|permission|role|error|admin|automatically|changed/.test(text)) roles.push('support');
  if (/api|odata|integration|platform|security|identity|replication|metadata/.test(text)) roles.push('architect');
  return Array.from(new Set(roles));
}

function testGuidance(item) {
  const text = [item.module,item.lifecycle,item.feature,item.title].join(' ').toLowerCase();
  if (/position/.test(text)) return 'Validate position create/update, incumbent changes, hierarchy, workflow, and permissions.';
  if (/job information|employee data|hire|termination|rehire/.test(text)) return 'Test hire, rehire, job change, termination, workflow triggers, and reporting outputs.';
  if (/api|odata|integration|replication/.test(text)) return 'Run integration smoke tests, API field mapping checks, delta detection, and downstream reconciliation.';
  if (/compensation|variable pay|reward/.test(text)) return 'Validate compensation form launch, eligibility, worksheet data, import jobs, and statement outputs.';
  if (/time|absence|timesheet/.test(text)) return 'Test absence request, time sheet submission, recalculation, approvals, and payroll handoff.';
  if (/permission|role|security|identity/.test(text)) return 'Validate permission roles, proxy/security scenarios, admin access, and audit logging.';
  return 'Review configuration, run preview regression, and confirm business process ownership.';
}

function recommendedAction(item) {
  const action = (item.action || '').toLowerCase();
  const enablement = (item.enablement || '').toLowerCase();
  const text = [item.title,item.description].join(' ').toLowerCase();
  if (action.includes('deprecated') || text.includes('deprecated') || text.includes('deleted')) return 'Add to deprecation watchlist and confirm replacement path before production.';
  if (enablement.includes('required')) return 'Schedule configuration review and owner sign-off during preview.';
  if (enablement.includes('automatically')) return 'Regression test in preview because behaviour may change without enablement.';
  if (enablement.includes('major')) return 'Assess adoption value, dependencies, and test scope before enabling.';
  return 'Review in preview and document whether it applies to your landscape.';
}

function renderRadarDashboard() {
  const container = document.getElementById('radar-dashboard');
  if (!container) return;
  const filtered = getFilteredItems().slice().sort((a,b) => (b.impactScore || 0) - (a.impactScore || 0));
  const base = activeVersion === 'all' ? allItems : allItems.filter(i => i.releaseVersion === activeVersion);
  const moduleStats = {};
  for (const item of base) {
    const mod = item.module || 'Other';
    if (!moduleStats[mod]) moduleStats[mod] = {critical:0,high:0,medium:0,low:0,total:0};
    const level = item.impact?.level || 'low';
    moduleStats[mod][level] = (moduleStats[mod][level] || 0) + 1;
    moduleStats[mod].total++;
  }
  const heatRows = Object.entries(moduleStats)
    .sort((a,b) => (b[1].critical*10 + b[1].high*3 + b[1].total/100) - (a[1].critical*10 + a[1].high*3 + a[1].total/100))
    .slice(0,8);
  const heatHtml = `<div class="heatmap-table"><div class="heatmap-row heatmap-head"><span>Module</span><span>Crit</span><span>High</span><span>Med</span><span>Low</span></div>${heatRows.map(([mod,s]) => `<div class="heatmap-row"><span class="heatmap-module" title="${escAttr(mod)}">${escHtml(mod)}</span><span class="heat-cell critical">${s.critical||0}</span><span class="heat-cell high">${s.high||0}</span><span class="heat-cell medium">${s.medium||0}</span><span class="heat-cell low">${s.low||0}</span></div>`).join('')}</div>`;
  container.innerHTML = `<div class="radar-panel"><h3>Module heatmap</h3><p>Critical and high impact concentration by module for the selected release.</p>${heatHtml}</div>`;
}

function filteredSorted(limit) {
  return getFilteredItems().slice().sort((a,b)=>(b.impactScore||0)-(a.impactScore||0)).slice(0, limit);
}

function activeFilterLabel() {
  const parts = [];
  parts.push(`Release: ${activeVersion === 'all' ? 'All' : activeVersion}`);
  parts.push(`Role: ${activeRole === 'all' ? 'All roles' : roleLabel(activeRole)}`);
  if (activeModule) parts.push(`Module: ${activeModule}`);
  if (searchQuery) parts.push(`Search: ${searchQuery}`);
  return parts.join(' | ');
}

function roleLabel(role) {
  return {consultant:'Consultant',test:'Test Lead',product:'Product Owner',support:'Support',architect:'Architect'}[role] || role;
}

function exportRadarBrief() {
  const items = filteredSorted(12);
  const lines = ['# SAP SuccessFactors Release Impact Brief','',activeFilterLabel(),'','## Top actions'];
  items.forEach((item,i) => lines.push(`${i+1}. [Score ${item.impactScore}] ${item.title} - ${item.recommendedAction}`));
  lines.push('','## Notes','- Validate in preview before production.','- Confirm owner for each required or automatically-on change.','- Source links remain SAP-owned references.');
  showExportOutput('Client brief', lines.join('\n'));
}

function exportTestPack() {
  const items = filteredSorted(20);
  const lines = ['# SAP SuccessFactors Preview Test Pack','',activeFilterLabel(),''];
  const byModule = {};
  items.forEach(item => { const mod = item.module || 'Other'; if (!byModule[mod]) byModule[mod] = []; byModule[mod].push(item); });
  for (const [mod, arr] of Object.entries(byModule)) {
    lines.push(`## ${mod}`);
    arr.forEach(item => lines.push(`- [ ] ${item.title}: ${item.testGuidance}`));
    lines.push('');
  }
  showExportOutput('Test pack', lines.join('\n'));
}

function exportDeprecationWatch() {
  const items = getFilteredItems().filter(item => {
    const text = [item.action,item.title,item.description,item.lifecycle,item.refNumber].join(' ').toLowerCase();
    return /deprecated|deleted|end of maintenance|will be deleted|deprecation/.test(text);
  }).sort((a,b)=>(b.impactScore||0)-(a.impactScore||0)).slice(0,25);
  const lines = ['# SAP SuccessFactors Deprecation Watchlist','',activeFilterLabel(),''];
  if (!items.length) lines.push('No deprecation or deletion items match the current filters.');
  items.forEach((item,i) => {
    lines.push(`## ${i+1}. ${item.title}`);
    lines.push(`- Score: ${item.impactScore}`);
    lines.push(`- Module: ${item.module || 'Other'}`);
    lines.push(`- Action: ${item.action || 'Review'}`);
    lines.push(`- Recommended action: ${item.recommendedAction}`);
    if (item.sapLink) lines.push(`- SAP source: ${fixSapLink(item.sapLink)}`);
    lines.push('');
  });
  showExportOutput('Deprecation watchlist', lines.join('\n'));
}

async function showExportOutput(title, text) {
  lastExportTitle = title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') || 'release-impact-export';
  lastExportText = text;
  document.getElementById('export-title').textContent = title;
  document.getElementById('export-text').value = text;
  document.getElementById('export-output').classList.add('active');
  try {
    await navigator.clipboard?.writeText(text);
  } catch(e) {
    // Textarea fallback is visible for browsers that block Clipboard API.
  }
}

async function copyExportText() {
  const text = document.getElementById('export-text').value || lastExportText;
  try { await navigator.clipboard?.writeText(text); } catch(e) {}
}

function downloadExportText() {
  const text = document.getElementById('export-text').value || lastExportText;
  const blob = new Blob([text], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${lastExportTitle || 'release-impact-export'}.md`;
  document.body.appendChild(a);
  a.click();
  URL.revokeObjectURL(a.href);
  a.remove();
}

function closeExportOutput() {
  document.getElementById('export-output').classList.remove('active');
}

function syncUrlState() {
  const params = new URLSearchParams();
  if (activeVersion !== 'all') params.set('release', activeVersion);
  if (activeRole !== 'all') params.set('role', activeRole);
  if (activeModule) params.set('module', activeModule);
  if (activeAction) params.set('action', activeAction);
  if (searchQuery) params.set('q', searchQuery);
  const qs = params.toString();
  const next = qs ? `${location.pathname}?${qs}${location.hash}` : `${location.pathname}${location.hash}`;
  if (location.search !== (qs ? '?' + qs : '')) history.replaceState(null, '', next);
}

function applyUrlState() {
  const params = new URLSearchParams(location.search);
  if (params.get('release')) activeVersion = params.get('release');
  if (params.get('role')) activeRole = params.get('role');
  if (params.get('module')) activeModule = params.get('module');
  if (params.get('action')) activeAction = params.get('action');

document.getElementById('search').addEventListener('input', (e) => {

document.getElementById('impact-filters').addEventListener('click', (e) => {
  if (!e.target.dataset.impact) return;
  const impact = e.target.dataset.impact;
  
  if (impact === 'all') {
    activeImpacts = new Set(['all']);
  } else {
    activeImpacts.delete('all');
    if (activeImpacts.has(impact)) {
      activeImpacts.delete(impact);
    } else {
      activeImpacts.add(impact);
    }
    if (!activeImpacts.size) activeImpacts = new Set(['all']);
  }
  
  // Update button states
  document.querySelectorAll('#impact-filters .filter-btn').forEach(btn => {
    btn.classList.toggle('active', activeImpacts.has(btn.dataset.impact));
  });
  
  render();
});

document.getElementById('action-filters').addEventListener('click', (e) => {
  if (!e.target.dataset.action) return;
  const action = e.target.dataset.action;
  
  if (action === 'all') {
    activeActions = new Set(['all']);
  } else {
    activeActions.delete('all');
    if (activeActions.has(action)) {
      activeActions.delete(action);
    } else {
      activeActions.add(action);
    }
    if (!activeActions.size) activeActions = new Set(['all']);
  }
  
  document.querySelectorAll('#action-filters .filter-btn').forEach(btn => {
    btn.classList.toggle('active', activeActions.has(btn.dataset.action));
  });
  
  render();
});

function fixSapLink(link) {
  if (!link) return '';
  if (link.startsWith('/')) return 'https://help.sap.com' + link;
  return link;
}

function parseVersionLabel(version) {
  const match = String(version || '').match(/([12])H\s+(\d{4})/);
  return match ? {half:Number(match[1]), year:Number(match[2])} : null;
}

function isFutureRelease(version, metadata) {
  if (String(version || '').toLowerCase().includes('preview')) return true;
  const parsed = parseVersionLabel(version);
  if (!parsed) return false;
  const dates = metadata?.releaseDates?.[String(version).replace(/\s*\(Preview\)\s*/,'').trim()];
  if (dates && String(dates.production || '').includes('(est.)')) return true;
  const now = new Date();
  const productionMonth = parsed.half === 1 ? 4 : 10;
  const productionDate = new Date(Date.UTC(parsed.year, productionMonth, 15));
  return productionDate > now;
}

// -- Dynamically render the version switcher buttons from metadata --
function renderVersionSwitcher(metadata) {
  const container = document.getElementById('version-switcher');
  if (!container) return;
  const versions = metadata.availableVersions || [];
  const counts = metadata.versionCounts || {};
  const total = metadata.totalItems || allItems.length || 0;
  let html = `<button class="ver-btn active" data-ver="all">All <span>${total}</span></button>`;
  for (const version of versions) {
    const isUpcoming = isFutureRelease(version, metadata);
    const count = counts[version] || 0;
    html += `<button class="ver-btn${isUpcoming ? ' upcoming' : ''}" data-ver="${escAttr(version)}">${escHtml(version)} <span>${count}</span></button>`;
  }
  container.innerHTML = html;
}

// -- Dynamically render the release timeline from metadata --
function renderReleaseTimeline(metadata) {
  const container = document.getElementById('release-timeline');
  if (!container) return;
  const releaseDates = metadata.releaseDates || {};
  let html = '';
  for (const [version, dates] of Object.entries(releaseDates)) {
    const isPreview = (dates.preview || '').includes('(est.)') || (dates.production || '').includes('(est.)');
    html += `<div class="phase"><span class="dot ${isPreview ? 'preview' : 'production'}"></span> <strong>${escHtml(version)}</strong> Preview: ${escHtml(dates.preview)} · Production: ${escHtml(dates.production)}</div>`;
  }
  container.innerHTML = html;
}

// -- Dynamically render the module selector list from data --
function renderModuleSelector() {
  const container = document.getElementById('module-list');
  if (!container || !allItems.length) return;
  const modules = {};
  for (const item of allItems) {
    const mod = item.module || 'Other';
    if (!modules[mod]) modules[mod] = { total: 0, critical: 0 };
    modules[mod].total++;
    if (item.impact && item.impact.level === 'critical') modules[mod].critical++;
  }
  const sorted = Object.entries(modules).sort((a, b) => a[0].localeCompare(b[0]));
  let html = '';
  for (const [mod, stats] of sorted) {
    const critBadge = stats.critical > 0 ? `<span style="color:var(--critical);font-size:10px">⚠${stats.critical}</span>` : '';
    html += `<label class="mod-select-item" data-module="${escAttr(mod)}"><input type="checkbox" class="mod-cb" data-module="${escAttr(mod)}" onchange="onModuleToggle()"><span class="mod-select-name">${escHtml(mod)} ${critBadge}</span><span class="mod-select-count">${stats.total}</span></label>`;
  }
  container.innerHTML = html;
}

// -- Utilities --
function escHtml(s) {
  if (!s) return '';
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function escAttr(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/'/g, '&#39;');
}

// -- Init --
loadData();

// ====== Checklist System ======
let selectedModules = JSON.parse(localStorage.getItem('sf-checklist-modules') || '[]');
let checklistDone = JSON.parse(localStorage.getItem('sf-checklist-done') || '{}');

function openChecklistSetup() {
  const modal = document.getElementById('setup-modal');
  modal.style.display = 'flex';
  renderModuleSelector();  // Refresh module list from latest data
  document.querySelectorAll('.mod-cb').forEach(function(cb) {
    cb.checked = selectedModules.indexOf(cb.dataset.module) !== -1;
  });
  onModuleToggle();
}

function closeModal() {
  document.getElementById('setup-modal').style.display = 'none';
}

function quickSelect(mode) {
  var cbs = document.querySelectorAll('.mod-cb');
  if (mode === 'all') {
    cbs.forEach(function(cb) { cb.checked = true; });
  } else if (mode === 'none') {
    cbs.forEach(function(cb) { cb.checked = false; });
  } else {
    // Compute dynamically from data - which modules have action-required or high-impact items
    var modStats = {};
    for (var i = 0; i < allItems.length; i++) {
      var item = allItems[i];
      var mod = item.module || 'Other';
      if (!modStats[mod]) modStats[mod] = { hasActionRequired: false, hasHighImpact: false };
      if (classifyItem(item) === 'action_required') modStats[mod].hasActionRequired = true;
      if (item.impact && (item.impact.level === 'critical' || item.impact.level === 'high')) modStats[mod].hasHighImpact = true;
    }
    cbs.forEach(function(cb) {
      var mod = cb.dataset.module;
      var stats = modStats[mod];
      if (!stats) { cb.checked = false; return; }
      if (mode === 'action_required') cb.checked = stats.hasActionRequired;
      else if (mode === 'high_impact') cb.checked = stats.hasHighImpact;
    });
  }
  onModuleToggle();
}

function onModuleToggle() {
  var checked = document.querySelectorAll('.mod-cb:checked');
  var count = checked.length;
  var btn = document.getElementById('generate-btn');
  btn.disabled = count === 0;
  btn.textContent = count === 0 ? 'Generate Checklist (select modules first)' : 'Generate Checklist (' + count + ' modules)';
}

function generateChecklist() {
  selectedModules = [];
  document.querySelectorAll('.mod-cb:checked').forEach(function(cb) {
    selectedModules.push(cb.dataset.module);
  });
  localStorage.setItem('sf-checklist-modules', JSON.stringify(selectedModules));
  closeModal();
  renderChecklist();
  document.getElementById('checklist-view').classList.add('active');
  document.querySelector('.main').classList.add('checklist-active');
  updateChecklistBadge();
}

function closeChecklist() {
  document.getElementById('checklist-view').classList.remove('active');
  document.querySelector('.main').classList.remove('checklist-active');
}

function renderChecklist() {
  var relevant = allItems.filter(function(i) { return selectedModules.indexOf(i.module) !== -1; });
  var categorized = { action_required: [], review_test: [], informational: [] };
  for (var i = 0; i < relevant.length; i++) {
    var cat = classifyItem(relevant[i]);
    categorized[cat].push(relevant[i]);
  }
  var total = relevant.length;
  var doneCount = Object.keys(checklistDone).filter(function(k) { return checklistDone[k]; }).length;
  var pct = total > 0 ? Math.round(doneCount / total * 100) : 0;
  document.getElementById('cl-done-count').textContent = doneCount;
  document.getElementById('cl-total-count').textContent = total;
  document.getElementById('cl-pct').textContent = pct + '%';
  document.getElementById('cl-progress-bar').style.width = pct + '%';

  var categories = [
    { key: 'action_required', icon: '\uD83D\uDD34', title: 'Action Required', desc: 'Deprecated, deleted, or auto-enabled changes - must be addressed', expand: true },
    { key: 'review_test', icon: '\uD83D\uDFE1', title: 'Review & Test', desc: 'New features and minor changes - evaluate before enabling', expand: false },
    { key: 'informational', icon: '\uD83D\uDFE2', title: 'Informational', desc: 'Updates that require no action', expand: false }
  ];

  var html = '';
  for (var c = 0; c < categories.length; c++) {
    var cat = categories[c];
    var catItems = categorized[cat.key];
    if (!catItems.length) continue;
    var catDone = catItems.filter(function(i) { return checklistDone[itemKey(i)]; }).length;
    var catPct = catItems.length > 0 ? Math.round(catDone / catItems.length * 100) : 0;
    var displayStyle = cat.expand ? 'block' : 'none';
    var chevronClass = cat.expand ? ' open' : '';

    html += '<div class="checklist-category">';
    html += '  <div class="checklist-category-header" onclick="toggleCat(this)">';
    html += '    <span class="cat-icon">' + cat.icon + '</span>';
    html += '    <span class="cat-title">' + cat.title + '</span>';
    html += '    <span class="cat-count">' + catDone + '/' + catItems.length + ' (' + catPct + '%)</span>';
    html += '    <span class="cat-chevron' + chevronClass + '">\u25B8</span>';
    html += '  </div>';
    html += '  <div class="checklist-items" style="display:' + displayStyle + '">';
    html += '    <p style="font-size:11px;color:var(--text3);padding:4px 16px 8px;margin:0">' + cat.desc + '</p>';

    for (var j = 0; j < catItems.length; j++) {
      var item = catItems[j];
      var key = itemKey(item);
      var done = checklistDone[key] ? 'checked' : '';
      var doneClass = done ? ' done' : '';
      var act = (item.action || '').toLowerCase();
      var actionClass = act === 'new' ? 'cl-new-tag' : (act === 'deprecated' || act === 'deleted') ? 'cl-action-tag' : 'cl-changed-tag';
      var impColor = 'var(--' + item.impact.level + ')';
      var desc = item.plainEnglish || escHtml((item.description || '').replace(/See More.*$/i, ''));

      html += '<div class="checklist-item' + doneClass + '">';
      html += '  <input type="checkbox" class="cl-checkbox" ' + done + ' onchange="toggleItem(this, \'' + key + '\')">';
      html += '  <div class="cl-content">';
      html += '    <div class="cl-title">' + escHtml(item.title) + '</div>';
      html += '    <div class="cl-meta">';
      html += '      <span class="cl-meta-tag ' + actionClass + '">' + escHtml(item.action) + '</span>';
      html += '      <span class="cl-meta-tag cl-enablement-tag">' + escHtml(item.enablement || '-') + '</span>';
      html += '      <span class="cl-meta-tag cl-enablement-tag" style="color:' + impColor + '">' + item.impact.label + '</span>';
      html += '    </div>';
      html += '    <div class="cl-desc">' + desc + '</div>';
      if (item.sapLink) {
        html += '    <a href="' + escHtml(fixSapLink(item.sapLink)) + '" target="_blank" rel="noopener" class="cl-sap-link">View on SAP</a>';
      }
      html += '  </div>';
      html += '</div>';
    }

    html += '  </div>';
    html += '</div>';
  }

  if (!total) {
    html = '<div style="text-align:center;padding:60px;color:var(--text3)"><div style="font-size:48px;margin-bottom:16px">\uD83D\uDCCB</div><div style="font-size:16px">No updates for your selected modules</div></div>';
  }

  document.getElementById('checklist-content').innerHTML = html;
}

function itemKey(item) {
  return (item.refNumber || item.title).replace(/[^a-zA-Z0-9]/g, '-').substring(0, 60);
}

function classifyItem(item) {
  var action = (item.action || '').toLowerCase();
  var enablement = (item.enablement || '').toLowerCase();
  var ref = (item.refNumber || '').toLowerCase();
  var isDep = action === 'deprecated' || action === 'deleted' || ref === 'deprecated';
  if (isDep) return 'action_required';
  if (action === 'changed' && ['major', 'required', 'automatically on', ''].indexOf(enablement) !== -1) return 'action_required';
  if (action === 'new' && ['major', 'required'].indexOf(enablement) !== -1) return 'review_test';
  if (action === 'changed' && ['minor', 'customer configured'].indexOf(enablement) !== -1) return 'review_test';
  return 'informational';
}

function toggleItem(checkbox, key) {
  checklistDone[key] = checkbox.checked;
  localStorage.setItem('sf-checklist-done', JSON.stringify(checklistDone));
  var el = checkbox.closest('.checklist-item');
  if (el) el.classList.toggle('done', checkbox.checked);
  renderChecklist();
}

function toggleCat(header) {
  var items = header.nextElementSibling;
  var chevron = header.querySelector('.cat-chevron');
  var isOpen = items.style.display === 'block';
  items.style.display = isOpen ? 'none' : 'block';
  chevron.classList.toggle('open', !isOpen);
}

function updateChecklistBadge() {
  var relevant = allItems.filter(function(i) { return selectedModules.indexOf(i.module) !== -1; });
  var actionRequired = relevant.filter(function(i) { return classifyItem(i) === 'action_required'; }).length;
  var badge = document.getElementById('checklist-badge');
  if (badge) badge.textContent = actionRequired > 0 ? actionRequired : '0';
}

function resetChecklist() {
  if (confirm('Reset all checklist progress? This cannot be undone.')) {
    checklistDone = {};
    localStorage.setItem('sf-checklist-done', '{}');
    renderChecklist();
  }
}

function exportChecklist(format) {
  if (format === 'json') {
    var relevant = allItems.filter(function(i) { return selectedModules.indexOf(i.module) !== -1; });
    var exportData = {
      generatedAt: new Date().toISOString(),
      modules: selectedModules,
      totalItems: relevant.length,
      items: relevant.map(function(i) {
        return {
          title: i.title, action: i.action, enablement: i.enablement,
          impact: i.impact.label, module: i.module, category: classifyItem(i),
          done: checklistDone[itemKey(i)] || false, sapLink: i.sapLink,
          plainEnglish: i.plainEnglish
        };
      }),
      progress: checklistDone
    };
    var blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'sf-release-checklist-' + new Date().toISOString().substring(0, 10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
  }
}

// Update badge on initial load
setTimeout(updateChecklistBadge, 500);

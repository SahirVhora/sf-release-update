<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="SF Release Update">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#141820"/><stop offset="100%" stop-color="#0a0d14"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f0c850"/><stop offset="50%" stop-color="#c8a84e"/><stop offset="100%" stop-color="#8b6914"/></linearGradient>
  </defs>
  <rect x="1" y="1" width="62" height="62" rx="12" fill="url(#bg)" stroke="#1c212b" stroke-width="1.5"/>
  <!-- Calendar page -->
  <rect x="16" y="12" width="32" height="36" rx="4" fill="none" stroke="url(#gold)" stroke-width="2.5"/>

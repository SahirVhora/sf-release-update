<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#090d14"/>
      <stop offset="100%" style="stop-color:#0d1119"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8a84e"/>
      <stop offset="100%" style="stop-color:#e0c46e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#c8a84e" stroke-width="0.5"/>
    <line x1="0" y1="63" x2="1200" y2="63" stroke="#c8a84e" stroke-width="0.5"/>
    <line x1="0" y1="126" x2="1200" y2="126" stroke="#c8a84e" stroke-width="0.5"/>
    <line x1="0" y1="189" x2="1200" y2="189" stroke="#c8a84e" stroke-width="0.5"/>
    <line x1="0" y1="252" x2="1200" y2="252" stroke="#c8a84e" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#c8a84e" stroke-width="0.5"/>
    <line x1="0" y1="378" x2="1200" y2="378" stroke="#c8a84e" stroke-width="0.5"/>
    <line x1="0" y1="441" x2="1200" y2="441" stroke="#c8a84e" stroke-width="0.5"/>
    <line x1="0" y1="504" x2="1200" y2="504" stroke="#c8a84e" stroke-width="0.5"/>
    <line x1="0" y1="567" x2="1200" y2="567" stroke="#c8a84e" stroke-width="0.5"/>
  </g>

  <!-- Gold accent line -->
  <rect x="60" y="80" width="120" height="3" rx="1.5" fill="url(#gold)"/>

  <!-- Title -->
  <text x="60" y="145" font-family="'Segoe UI', system-ui, sans-serif" font-size="42" font-weight="700" fill="#e6e9f0" letter-spacing="-0.5">SAP SF Release Updates</text>
  <text x="60" y="190" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" fill="#5f6675" letter-spacing="0.5">SAP SuccessFactors Release Tracker</text>

  <!-- Description -->
  <text x="60" y="240" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" fill="#c5c9d4">
    Every SAP SuccessFactors release update - scraped, classified by
  </text>
  <text x="60" y="268" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" fill="#c5c9d4">
    impact, and summarised in plain English. Updated weekly.
  </text>

  <!-- Stat cards -->
  <rect x="60" y="310" width="160" height="100" rx="8" fill="#111620" stroke="#1c212b" stroke-width="1"/>
  <text x="140" y="350" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#gold)" text-anchor="middle">492</text>
  <text x="140" y="380" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#5f6675" text-anchor="middle">Total Updates</text>

  <rect x="240" y="310" width="160" height="100" rx="8" fill="#111620" stroke="#1c212b" stroke-width="1"/>
  <text x="320" y="350" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="#e05151" text-anchor="middle">34</text>
  <text x="320" y="380" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#5f6675" text-anchor="middle">Critical</text>

  <rect x="420" y="310" width="160" height="100" rx="8" fill="#111620" stroke="#1c212b" stroke-width="1"/>
  <text x="500" y="350" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="#e07b3c" text-anchor="middle">94</text>
  <text x="500" y="380" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#5f6675" text-anchor="middle">High</text>

  <rect x="600" y="310" width="160" height="100" rx="8" fill="#111620" stroke="#1c212b" stroke-width="1"/>
  <text x="680" y="350" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="#d4a434" text-anchor="middle">277</text>
  <text x="680" y="380" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#5f6675" text-anchor="middle">Medium</text>

  <rect x="780" y="310" width="160" height="100" rx="8" fill="#111620" stroke="#1c212b" stroke-width="1"/>
  <text x="860" y="350" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="#3fb96b" text-anchor="middle">87</text>
  <text x="860" y="380" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#5f6675" text-anchor="middle">Low</text>

  <!-- Divider -->
  <line x1="60" y1="450" x2="1140" y2="450" stroke="#1c212b" stroke-width="1"/>

  <!-- Features row -->
  <g transform="translate(60, 480)">
    <rect x="0" y="0" width="24" height="24" rx="6" fill="#c8a84e" opacity="0.15"/>
    <text x="12" y="16" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#c8a84e" text-anchor="middle">1</text>
    <text x="34" y="17" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#c5c9d4">1H 2026 + 2H 2026 preview</text>

    <rect x="350" y="0" width="24" height="24" rx="6" fill="#c8a84e" opacity="0.15"/>
    <text x="362" y="16" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#c8a84e" text-anchor="middle">2</text>
    <text x="384" y="17" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#c5c9d4">Plain-English impact summaries</text>

    <rect x="700" y="0" width="24" height="24" rx="6" fill="#c8a84e" opacity="0.15"/>
    <text x="712" y="16" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#c8a84e" text-anchor="middle">3</text>
    <text x="734" y="17" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#c5c9d4">Auto-updating, zero maintenance</text>
  </g>

  <!-- Footer -->
  <text x="60" y="560" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#5f6675">sahirvhora.github.io/sf-release-update</text>

  <rect x="980" y="545" width="160" height="30" rx="15" fill="none" stroke="#c8a84e" stroke-width="1.5" opacity="0.6"/>
  <text x="1060" y="565" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#c8a84e" text-anchor="middle" opacity="0.8">View Live →</text>

  <!-- Bottom corner accent -->
  <rect x="1140" y="627" width="60" height="3" rx="1.5" fill="url(#gold)"/>
</svg>
